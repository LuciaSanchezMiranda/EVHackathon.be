# ==========================================
# CONEXION A SQL SERVER
# Cambia el password segun tu entorno
# ==========================================
spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=TechStore;encrypt=true;trustServerCertificate=true
    username: sa
    password: Admin123456!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  # ==========================================
  # JPA / HIBERNATE
  # none: no toca la BD, solo usa lo que ya existe
  # ==========================================
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none
    open-in-view: false

  main:
    allow-bean-definition-overriding: true

  # ==========================================
  # TAMANIO MAXIMO DE ARCHIVOS (importacion)
  # ==========================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# ==========================================
# SERVIDOR
# ==========================================
server:
  port: 5000

# ==========================================
# SWAGGER / OPENAPI
# ==========================================
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
